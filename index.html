<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serpente Marítima</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-900 text-white">


<div class="max-w-6xl mx-auto p-5">


<div class="bg-gray-800 p-5 rounded-xl border border-gray-700 flex justify-between items-center">


<div>

<h1 class="text-2xl font-bold">
SERPENTE <span class="text-green-500">MARÍTIMA</span>
</h1>

<p class="text-gray-400">
REDM • META SEMANAL
</p>

</div>


<button onclick="abrir()"
class="bg-green-600 px-4 py-2 rounded">

ENVIAR COMPROVANTE

</button>


</div>



<div class="bg-gray-800 mt-5 p-5 rounded-xl">


<h2 class="font-bold text-xl">
PROGRESSO DA META
</h2>


<p class="mt-3">
Meta: <span id="meta">1500</span> moedas
</p>


<div class="bg-gray-700 rounded-full h-3 mt-3">

<div id="barra"
class="bg-green-500 h-3 rounded-full"
style="width:0%">
</div>

</div>


<p id="textoMeta" class="mt-2 text-green-500">
0%
</p>


</div>





<div class="bg-gray-800 mt-5 p-5 rounded-xl">


<h2 class="text-xl font-bold mb-3">
RANKING
</h2>


<div id="ranking">

Carregando...

</div>


</div>





</div>





<div id="modal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">


<div class="bg-gray-800 p-5 rounded-xl w-96">


<h2 class="font-bold mb-3">
Enviar depósito
</h2>


<input id="id"
placeholder="ID REDM"
class="w-full bg-gray-900 p-2 mb-2 rounded">


<input id="nick"
placeholder="Nick"
class="w-full bg-gray-900 p-2 mb-2 rounded">


<input id="moedas"
placeholder="Moedas"
type="number"
class="w-full bg-gray-900 p-2 mb-2 rounded">


<input id="foto"
type="file"
accept="image/*"
class="mb-3">


<button onclick="enviar()"
class="bg-green-600 w-full p-2 rounded">

Enviar

</button>


</div>

</div>





<script>


const URL="https://bhognzqedmsdrjqatocx.supabase.co"

const KEY="sb_publishable_NKo_dHL8X29MM0kpGSjzFQ_cZdkvjM4"


const db=supabase.createClient(URL,KEY)



function abrir(){

document.getElementById("modal")
.classList.remove("hidden")

}




async function carregar(){


let r =
await db.from("players")
.select("*")
.order("moedas",{ascending:false})



let html=""


r.data.forEach((p,i)=>{


html+=`

<div class="bg-gray-900 p-3 rounded mb-2 flex justify-between">

<div>

<b>#${i+1} ${p.nick}</b>

<br>

<span class="text-green-500">
${p.moedas} moedas
</span>

</div>

</div>

`

})


document.getElementById("ranking")
.innerHTML=
html || "Nenhum player"



let total=0


r.data.forEach(p=>{
total+=p.moedas
})



let porcentagem =
Math.min((total/1500)*100,100)



document.getElementById("barra")
.style.width=porcentagem+"%"



document.getElementById("textoMeta")
.innerHTML=
porcentagem.toFixed(1)+"%"

}





async function enviar(){


let file=
document.getElementById("foto").files[0]


let nome=Date.now()+"-"+file.name


await db.storage
.from("comprovantes")
.upload(nome,file)



let foto =
db.storage
.from("comprovantes")
.getPublicUrl(nome)
.data.publicUrl




await db.from("depositos")
.insert({

id_redm:
document.getElementById("id").value,

nick:
document.getElementById("nick").value,

moedas:
Number(document.getElementById("moedas").value),

valor:
Number(document.getElementById("moedas").value)*4,

foto:foto,

status:"pendente"

})



alert("Enviado!")

location.reload()


}




carregar()


</script>


</body>
</html>
