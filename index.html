<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serpente Marítima - REDM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100">
  <!-- Header -->
  <div class="max-w-7xl mx-auto p-4">
    <div class="bg-gray-800 rounded-lg p-4 mb-6 flex justify-between items-center border border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <div>
          <h1 class="text-xl font-bold">SERPENTE <span class="text-green-500">MARÍTIMA</span></h1>
          <p class="text-xs text-gray-400">REDM • METAS SEMANAIS</p>
        </div>
      </div>
      <button onclick="abrirModalComprovante()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        ENVIAR COMPROVANTE
      </button>
    </div>

    <!-- Progresso -->
    <div class="bg-gray-800 rounded-lg p-6 mb-6 border border-gray-700">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-6 h-6 bg-green-600 rounded-full flex items-center justify-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-lg font-bold">PROGRESSO GERAL DA SEMANA</h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="bg-gray-900 rounded-lg p-4">
          <p class="text-xs text-gray-400 mb-1">DINHEIRO LIMPO</p>
          <div class="flex justify-between items-baseline mb-2">
            <span class="text-3xl font-bold">$66.200</span>
            <span class="text-sm text-gray-400">/ $66.200</span>
          </div>
          <div class="w-full bg-gray-700 rounded-full h-2">
            <div class="bg-green-500 h-2 rounded-full" style="width: 100%"></div>
          </div>
          <p class="text-xs text-green-500 mt-1">100% CONCLUÍDO</p>
        </div>
        <div class="bg-gray-900 rounded-lg p-4">
          <p class="text-xs text-gray-400 mb-1">DINHEIRO SUJO</p>
          <div class="flex justify-between items-baseline mb-2">
            <span class="text-3xl font-bold">$35.600</span>
            <span class="text-sm text-gray-400">/ $39.900</span>
          </div>
          <div class="w-full bg-gray-700 rounded-full h-2">
            <div class="bg-green-500 h-2 rounded-full" style="width: 89%"></div>
          </div>
          <p class="text-xs text-green-500 mt-1">89.2% CONCLUÍDO</p>
        </div>
      </div>
      <div class="bg-gray-900 rounded-lg p-4">
        <p class="text-xs text-gray-400 mb-1">META GERAL</p>
        <div class="flex justify-between items-baseline mb-2">
          <span class="text-3xl font-bold">$101.800</span>
          <span class="text-sm text-gray-400">/ $106.100</span>
        </div>
        <div class="w-full bg-gray-700 rounded-full h-2">
          <div class="bg-green-500 h-2 rounded-full" style="width: 96%"></div>
        </div>
        <p class="text-xs text-green-500 mt-1">96% CONCLUÍDO</p>
      </div>
    </div>

    <!-- Ranking -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
      <div class="flex items-center gap-2 mb-4">
        <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
        <h2 class="text-lg font-bold">RANKING SEMANAL</h2>
      </div>
      <div id="ranking" class="space-y-3"></div>
    </div>
  </div>

  <!-- Modal Comprovante -->
  <div id="modalComprovante" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
    <div class="bg-gray-800 rounded-lg p-6 w-full max-w-md border border-gray-700">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold">Enviar Comprovante</h3>
        <button onclick="fecharModalComprovante()" class="text-gray-400 hover:text-white">✕</button>
      </div>
      <form id="formComprovante" class="space-y-4">
        <div>
          <label class="block text-sm mb-1">ID REDM</label>
          <input type="number" id="id_redm" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm mb-1">NICK NO JOGO</label>
          <input type="text" id="nick" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm mb-1">VALOR EM $</label>
          <input type="number" id="valor" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm mb-1">TIPO</label>
          <select id="tipo" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
            <option value="Dinheiro Limpo">Dinheiro Limpo</option>
            <option value="Dinheiro Sujo">Dinheiro Sujo</option>
          </select>
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded-lg font-bold">ENVIAR</button>
      </form>
      <div id="msgComprovante" class="mt-3 text-center text-sm"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg">
    <span id="toastMsg"></span>
  </div>

  <script>
    // TROQUE AQUI PELAS SUAS CHAVES DO SUPABASE
    const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co'
    const SUPABASE_KEY = 'SUA_CHAVE_ANON_AQUI'
    
    const { createClient } = supabase
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY)

    function abrirModalComprovante() {
      document.getElementById('modalComprovante').classList.remove('hidden')
    }

    function fecharModalComprovante() {
      document.getElementById('modalComprovante').classList.add('hidden')
      document.getElementById('formComprovante').reset()
      document.getElementById('msgComprovante').textContent = ''
    }

    function showToast(msg) {
      const toast = document.getElementById('toast')
      document.getElementById('toastMsg').textContent = msg
      toast.classList.remove('hidden')
      setTimeout(() => toast.classList.add('hidden'), 3000)
    }

    document.getElementById('formComprovante').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = e.target.querySelector('button[type="submit"]')
      btn.disabled = true
      btn.textContent = 'ENVIANDO...'

      const deposito = {
        id_redm: parseInt(document.getElementById('id_redm').value),
        nick: document.getElementById('nick').value,
        valor: parseFloat(document.getElementById('valor').value),
        tipo: document.getElementById('tipo').value,
        status: 'pendente'
      }

      const { error } = await supabaseClient.from('depositos_pendentes').insert([deposito])

      if (error) {
        document.getElementById('msgComprovante').innerHTML = `<span class="text-red-500">Erro: ${error.message}</span>`
      } else {
        showToast('Comprovante enviado! Aguarde aprovação.')
        fecharModalComprovante()
      }
      btn.disabled = false
      btn.textContent = 'ENVIAR'
    })

    // Carregar ranking
    async function carregarRanking() {
      const { data } = await supabaseClient.from('ranking_semanal').select('*').order('total', { ascending: false })
      const ranking = document.getElementById('ranking')
      ranking.innerHTML = data?.map((p, i) => `
        <div class="bg-gray-900 rounded-lg p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center text-sm font-bold">${i+1}</div>
            <div>
              <p class="font-bold">${p.nick}</p>
              <p class="text-xs text-gray-400">ID: ${p.id_redm}</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-xs text-gray-400">Total: <span class="text-green-500 font-bold">$${p.total?.toLocaleString()}</span></p>
          </div>
        </div>
      `).join('') || '<p class="text-gray-400 text-center">Nenhum jogador ainda</p>'
    }

    carregarRanking()

    // Fechar modal clicando fora
    document.getElementById('modalComprovante').addEventListener('click', (e) => {
      if (e.target.id === 'modalComprovante') fecharModalComprovante()
    })
  </script>
</body>
</html>
