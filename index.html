<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serpente Marítima</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="max-w-5xl mx-auto p-5">

<div class="bg-gray-800 p-5 rounded-xl border border-gray-700 flex justify-between">

<div>
<h1 class="text-2xl font-bold">
SERPENTE <span class="text-green-500">MARÍTIMA</span>
</h1>

<p class="text-gray-400">
REDM • DEPÓSITOS
</p>

</div>

<a href="admin.html"
class="bg-green-600 px-4 py-2 rounded-lg">
ADM
</a>

</div>


<div class="bg-gray-800 mt-5 p-5 rounded-xl">

<h2 class="text-xl font-bold mb-4">
Enviar comprovante
</h2>


<input id="id"
placeholder="ID REDM"
class="w-full bg-gray-900 p-3 rounded mb-3">


<input id="nick"
placeholder="Nick"
class="w-full bg-gray-900 p-3 rounded mb-3">


<input id="moedas"
placeholder="Quantidade de moedas"
type="number"
class="w-full bg-gray-900 p-3 rounded mb-3">


<input id="foto"
type="file"
accept="image/*"
class="mb-3">


<button onclick="enviar()"
class="bg-green-600 w-full p-3 rounded font-bold">

ENVIAR COMPROVANTE

</button>


<p id="msg" class="mt-3"></p>

</div>

</div>



<script>


const URL="https://bhognzqedmsdrjqatocx.supabase.co"

const KEY="sb_publishable_NKo_dHL8X29MM0kpGSjzFQ_cZdkvjM4"


const db=supabase.createClient(URL,KEY)



async function enviar(){


let id=document.getElementById("id").value

let nick=document.getElementById("nick").value

let moedas=
Number(document.getElementById("moedas").value)


let file=
document.getElementById("foto").files[0]



if(!file){
alert("Envie a foto")
return
}



let nome=
Date.now()+"-"+file.name



let upload=
await db.storage
.from("comprovantes")
.upload(nome,file)



let link=
db.storage
.from("comprovantes")
.getPublicUrl(nome)
.data.publicUrl




await db.from("depositos")
.insert({

id_redm:id,
nick:nick,
moedas:moedas,
valor:moedas*4,
foto:link,
status:"pendente"

})



document.getElementById("msg")
.innerHTML=
"Enviado para aprovação ✅"


}


</script>


</body>
</html>
